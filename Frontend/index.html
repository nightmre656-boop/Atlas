<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <title>Atlas V4 — Login</title>
    <link rel="shortcut icon" href="TA.png" type="image/x-icon" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="video-bg">
      <video id="bg-video" autoplay loop muted>
        <source
          <!-- src="https://graph.org/file/57837b3c2721ea10d2345.mp4"-->
          src="https://viddler.com/#/embed/player?id=9891&playbackId=QzzIHSCZWbth3n7pigTFhcaVz63GwYxhP7OPQ02bBv008&color=default

          type="video/mp4"
        />
      </video>
    </div>

    <div class="container">
      <div class="screen">
        <div class="screen__content">
          <!-- Logo + Title -->
          <div class="login__field logo-area">
            <img class="main-logo" src="TA.png" alt="logo" />
          </div>
          <div class="login__field">
            <h2 class="txt">Atlas WhatsApp Bot V4</h2>
          </div>

          <!-- Status Indicator -->
          <div class="status-bar" id="statusBar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Checking status...</span>
          </div>

          <!-- Tab Switcher -->
          <div class="tab-switcher">
            <button class="tab-btn active" id="tabQr" onclick="switchTab('qr')">
              <i class="fa fa-qrcode"></i> QR Code
            </button>
            <button class="tab-btn" id="tabPair" onclick="switchTab('pair')">
              <i class="fa fa-phone"></i> Pairing Code
            </button>
          </div>

          <!-- QR Code Tab -->
          <div class="tab-content active" id="qrTab">
            <div class="qr-area" id="qrArea">
              <div class="qr-loading" id="qrLoading">
                <div class="spinner"></div>
                <p>Waiting for QR Code...</p>
              </div>
              <img id="qrImage" class="qr-image" alt="QR Code" style="display:none;" />
              <p class="qr-hint" id="qrHint">Scan this QR code with WhatsApp</p>
            </div>
          </div>

          <!-- Pairing Code Tab -->
          <div class="tab-content" id="pairTab">
            <div class="pair-area">
              <p class="pair-desc">Enter your WhatsApp number with country code</p>
              <input
                type="text"
                class="login__input"
                placeholder="e.g. 918888888888"
                id="phoneInput"
              />
              <button class="button login__submit pair-btn" id="pairBtn" onclick="requestPairingCode()">
                <span class="button__text">Get Pairing Code</span>
              </button>
              <div class="pair-result" id="pairResult" style="display:none;">
                <p class="pair-label">Your Pairing Code:</p>
                <p class="pair-code" id="pairCode"></p>
                <p class="pair-hint">Enter this code in WhatsApp → Linked Devices → Link with phone number</p>
              </div>
              <p class="pair-error" id="pairError" style="display:none;"></p>
            </div>
          </div>

          <!-- Connected View -->
          <div class="tab-content" id="connectedTab" style="display:none;">
            <div class="connected-area">
              <i class="fa fa-check-circle connected-icon"></i>
              <p class="connected-text">Bot is Connected!</p>
            </div>
          </div>

          <!-- Footer -->
          <p class="follow_me">Please Support Me on</p>
          <div class="my_icons">
            <a
              class="icon_git"
              href="https://www.github.com/FantoX"
              style="padding-right: 15px; text-decoration: none"
              target="_blank"
            >
              <i
                class="fa fa-github"
                style="font-size: 26px; color: rgb(0, 0, 0)"
              ></i>
            </a>
            <a
              class="icon_git"
              href="https://www.youtube.com/@fantox001"
              style="text-decoration: none"
              target="_blank"
            >
              <i
                class="fa fa-youtube-play"
                style="font-size: 26px; color: rgb(234, 23, 23)"
              ></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentTab = "qr";
      let qrPollInterval = null;
      let statusPollInterval = null;

      function switchTab(tab) {
        currentTab = tab;
        document.getElementById("tabQr").classList.toggle("active", tab === "qr");
        document.getElementById("tabPair").classList.toggle("active", tab === "pair");
        document.getElementById("qrTab").classList.toggle("active", tab === "qr");
        document.getElementById("pairTab").classList.toggle("active", tab === "pair");
      }

      async function pollStatus() {
        try {
          const res = await fetch("/api/status");
          const data = await res.json();
          const dot = document.getElementById("statusDot");
          const text = document.getElementById("statusText");

          if (data.status === "open") {
            dot.className = "status-dot connected";
            text.textContent = "Connected";
            // Show connected view, hide tabs
            document.getElementById("qrTab").style.display = "none";
            document.getElementById("pairTab").style.display = "none";
            document.getElementById("connectedTab").style.display = "block";
            document.querySelector(".tab-switcher").style.display = "none";
            if (qrPollInterval) clearInterval(qrPollInterval);
          } else if (data.status === "qr") {
            dot.className = "status-dot waiting";
            text.textContent = "Waiting for login...";
          } else if (data.status === "connecting") {
            dot.className = "status-dot connecting";
            text.textContent = "Connecting...";
          } else {
            dot.className = "status-dot";
            text.textContent = data.status || "Initializing...";
          }
        } catch (e) {
          // ignore network errors
        }
      }

      async function pollQr() {
        try {
          const res = await fetch("/api/qr");
          const data = await res.json();
          const img = document.getElementById("qrImage");
          const loading = document.getElementById("qrLoading");
          const hint = document.getElementById("qrHint");

          if (data.status === "connected") {
            if (qrPollInterval) clearInterval(qrPollInterval);
            return;
          }

          if (data.status === "qr" && data.qr) {
            img.src = data.qr;
            img.style.display = "block";
            loading.style.display = "none";
            hint.style.display = "block";
          } else {
            img.style.display = "none";
            loading.style.display = "flex";
            hint.style.display = "none";
          }
        } catch (e) {
          // ignore
        }
      }

      async function requestPairingCode() {
        const phone = document.getElementById("phoneInput").value.trim();
        const resultDiv = document.getElementById("pairResult");
        const errorDiv = document.getElementById("pairError");
        const btn = document.getElementById("pairBtn");

        resultDiv.style.display = "none";
        errorDiv.style.display = "none";

        if (!phone) {
          errorDiv.textContent = "Please enter a phone number!";
          errorDiv.style.display = "block";
          return;
        }

        btn.disabled = true;
        btn.querySelector(".button__text").textContent = "Requesting...";

        try {
          const res = await fetch("/api/pair", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone }),
          });
          const data = await res.json();

          if (data.code) {
            document.getElementById("pairCode").textContent = data.code;
            resultDiv.style.display = "block";
          } else if (data.error) {
            errorDiv.textContent = data.error;
            errorDiv.style.display = "block";
          }
        } catch (e) {
          errorDiv.textContent = "Network error. Please try again.";
          errorDiv.style.display = "block";
        }

        btn.disabled = false;
        btn.querySelector(".button__text").textContent = "Get Pairing Code";
      }

      // Start polling
      pollStatus();
      pollQr();
      statusPollInterval = setInterval(pollStatus, 3000);
      qrPollInterval = setInterval(pollQr, 5000);
    </script>
  </body>
</html>
